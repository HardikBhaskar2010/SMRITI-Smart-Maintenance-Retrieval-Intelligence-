[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
markers =
    slow: marks tests as slow (LLM round-trips > 5s)
    integration: marks tests that need a live backend
    unit: marks fast isolated unit tests
